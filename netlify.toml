[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  DATOCMS_ENV = "main"
  CMS_FALLBACK_MODE = "dev-only"

# Geo-redirect: Italian visitors → /it/
[[redirects]]
  from = "/"
  to = "/it/"
  status = 302
  force = false
  conditions = {Country = ["IT"]}

# Note:
# - Configure DATOCMS_API_TOKEN in Netlify UI (do not commit secrets).
# - Configure a DatoCMS publish webhook that calls your Netlify build hook URL.
